{% load i18n %}
{% if data.form.non_field_errors %}
<div class="alert alert-danger">
    {{ data.form.non_field_errors }}
</div>
{% endif %}

<form method="post">
    {% csrf_token %}
    {% for field in data.form %}
    <div class="am-panel-field">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
        {% if field.help_text %}
        <div class="form-text password-help">{{ field.help_text }}</div>
        {% endif %}
        {% for error in field.errors %}
        <div class="text-danger small">{{ error }}</div>
        {% endfor %}
    </div>
    {% endfor %}
    <button type="submit" class="am-panel-submit">
        <i class="fas fa-save"></i> Save changes
    </button>
    <div class="am-panel-links">
        <a href="{% url 'core_dashboard_profile' %}"><i class="fas fa-times"></i> Cancel</a>
    </div>
</form>
